# Copy this file to .github/workflows/claude.yml in your repository
#
# Required setup:
# 1. Add CLAUDE_CODE_OAUTH_TOKEN to repository secrets
# 2. Adjust authorized_roles if needed

name: Claude Code

on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write
  actions: read

jobs:
  claude:
    uses: outcomeeng/gh-actions/.github/workflows/claude.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    # Uncomment and modify to customize:
    # with:
    #   authorized_roles: '["OWNER", "MEMBER"]'
    #   mention_trigger: '@bot'
    #   concurrency_cancel: false
    #   allowed_tools: '--allowed-tools "Read,Grep,Glob,Bash(gh pr:*)"'
    #
    # Plugin marketplace options (plugins read from .claude/settings.json by default):
    #   skip_plugin_install: true                              # repos with no plugins
    #   plugin_marketplaces: "outcomeeng/plugins@main acme-corp/plugins@v2"  # additional/override marketplaces
    #   extra_plugins: "internal-style@acme"                  # install beyond .claude/settings.json
