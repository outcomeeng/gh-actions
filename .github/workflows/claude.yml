# Reusable Claude Code workflow for @claude mentions
#
# Usage in caller workflow:
#
#   on:
#     issue_comment:
#       types: [created, edited]
#     pull_request_review_comment:
#       types: [created, edited]
#     issues:
#       types: [opened, assigned]
#     pull_request_review:
#       types: [submitted]
#
#   jobs:
#     claude:
#       uses: outcomeeng/gh-actions/.github/workflows/claude.yml@main
#       secrets:
#         CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

name: Claude Code

on:
  workflow_call:
    inputs:
      authorized_roles:
        description: 'JSON array of GitHub author associations allowed to trigger (e.g., ["OWNER", "MEMBER"])'
        type: string
        default: '["OWNER", "MEMBER", "COLLABORATOR"]'
      mention_trigger:
        description: "Text that triggers the workflow"
        type: string
        default: "@claude"
      concurrency_cancel:
        description: "Cancel in-progress runs when new mention arrives"
        type: boolean
        default: true
      allowed_tools:
        description: "Claude Code --allowed-tools argument (empty = unrestricted)"
        type: string
        default: ""
      custom_prompt:
        description: "Custom prompt to override default behavior"
        type: string
        default: ""
      plugin_marketplaces:
        description: "Space-separated list of marketplaces to register (owner/repo[@ref])"
        type: string
        default: "outcomeeng/plugins@main"
      extra_plugins:
        description: "Space-separated extra plugins to install beyond .claude/settings.json"
        type: string
        default: ""
      skip_plugin_install:
        description: "Set to true for repos that don't use the plugin marketplace"
        type: boolean
        default: false
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "Claude Code OAuth token"
        required: true

jobs:
  claude:
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: ${{ inputs.concurrency_cancel }}
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, inputs.mention_trigger) &&
         contains(fromJSON(inputs.authorized_roles), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, inputs.mention_trigger) &&
         contains(fromJSON(inputs.authorized_roles), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, inputs.mention_trigger) &&
         contains(fromJSON(inputs.authorized_roles), github.event.review.author_association)) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, inputs.mention_trigger) || contains(github.event.issue.title, inputs.mention_trigger)) &&
         contains(fromJSON(inputs.authorized_roles), github.event.issue.author_association))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Restore Claude plugin cache
        if: ${{ !inputs.skip_plugin_install }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.claude/plugins
          key: claude-plugins-${{ hashFiles('.claude/settings.json') }}-${{ inputs.plugin_marketplaces }}-${{ inputs.extra_plugins }}

      - name: Setup Claude plugins
        if: ${{ !inputs.skip_plugin_install }}
        shell: bash
        env:
          PLUGIN_MARKETPLACES: ${{ inputs.plugin_marketplaces }}
          EXTRA_PLUGINS: ${{ inputs.extra_plugins }}
        run: |
          set -euo pipefail
          npm i -g @anthropic-ai/claude-code

          echo "::group::Register plugin marketplaces"
          for m in $PLUGIN_MARKETPLACES; do
            [[ -z "$m" ]] && continue
            echo "Adding marketplace: $m"
            claude plugin marketplace add "$m"
          done
          echo "::endgroup::"

          if [[ -f .claude/settings.json ]]; then
            jq empty .claude/settings.json
            if jq -e '.enabledPlugins' .claude/settings.json > /dev/null; then
              echo "::group::Install plugins from .claude/settings.json"
              while IFS= read -r plugin; do
                [[ -z "$plugin" ]] && continue
                echo "Installing $plugin"
                claude plugin install "$plugin"
              done < <(jq -r '.enabledPlugins | to_entries[] | select(.value == true) | .key' .claude/settings.json)
              echo "::endgroup::"
            else
              echo "::notice::No enabledPlugins in .claude/settings.json — skipping settings-driven install"
            fi
          fi

          if [[ -n "${EXTRA_PLUGINS}" ]]; then
            echo "::group::Install extra plugins"
            for p in $EXTRA_PLUGINS; do
              [[ -z "$p" ]] && continue
              echo "Installing $p"
              claude plugin install "$p"
            done
            echo "::endgroup::"
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1.0.111
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: ${{ inputs.custom_prompt }}
          claude_args: ${{ inputs.allowed_tools }}
