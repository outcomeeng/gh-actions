# Reusable Claude Code Review workflow for automatic PR reviews
#
# Usage in caller workflow:
#
#   on:
#     pull_request:
#       types: [opened, synchronize]
#
#   jobs:
#     review:
#       uses: outcomeeng/gh-actions/.github/workflows/claude-code-review.yml@main
#       secrets:
#         CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

name: Claude Code Review

on:
  workflow_call:
    inputs:
      authorized_roles:
        description: 'JSON array of GitHub author associations allowed to trigger (e.g., ["OWNER", "MEMBER"])'
        type: string
        default: '["OWNER", "MEMBER", "COLLABORATOR"]'
      concurrency_cancel:
        description: "Cancel in-progress reviews when PR is updated"
        type: boolean
        default: false
      allowed_tools:
        description: "Claude Code --allowed-tools argument"
        type: string
        default: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
      custom_prompt:
        description: "Custom review prompt (replaces default)"
        type: string
        default: ""
      plugin_marketplaces:
        description: "Space-separated list of marketplaces to register (owner/repo[@ref])"
        type: string
        default: "outcomeeng/plugins@main"
      extra_plugins:
        description: "Space-separated extra plugins to install beyond .claude/settings.json"
        type: string
        default: ""
      skip_plugin_install:
        description: "Set to true for repos that don't use the plugin marketplace"
        type: boolean
        default: false
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "Claude Code OAuth token"
        required: true

jobs:
  claude-review:
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: ${{ inputs.concurrency_cancel }}
    if: |
      contains(fromJSON(inputs.authorized_roles), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Restore Claude plugin cache
        if: ${{ !inputs.skip_plugin_install }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.claude/plugins
          key: claude-plugins-${{ hashFiles('.claude/settings.json') }}-${{ inputs.plugin_marketplaces }}

      - name: Setup Claude plugins
        if: ${{ !inputs.skip_plugin_install }}
        shell: bash
        env:
          PLUGIN_MARKETPLACES: ${{ inputs.plugin_marketplaces }}
          EXTRA_PLUGINS: ${{ inputs.extra_plugins }}
        run: |
          set -euo pipefail
          npm i -g @anthropic-ai/claude-code

          echo "::group::Register plugin marketplaces"
          for m in $PLUGIN_MARKETPLACES; do
            [[ -z "$m" ]] && continue
            echo "Adding marketplace: $m"
            claude plugin marketplace add "$m"
          done
          echo "::endgroup::"

          if [[ -f .claude/settings.json ]]; then
            if jq -e '.enabledPlugins' .claude/settings.json > /dev/null 2>&1; then
              echo "::group::Install plugins from .claude/settings.json"
              while IFS= read -r plugin; do
                [[ -z "$plugin" ]] && continue
                echo "Installing $plugin"
                claude plugin install "$plugin"
              done < <(jq -r '.enabledPlugins | to_entries[] | select(.value == true) | .key' .claude/settings.json)
              echo "::endgroup::"
            else
              echo "::notice::No enabledPlugins in .claude/settings.json — skipping settings-driven install"
            fi
          fi

          if [[ -n "${EXTRA_PLUGINS}" ]]; then
            echo "::group::Install extra plugins"
            for p in $EXTRA_PLUGINS; do
              [[ -z "$p" ]] && continue
              echo "Installing $p"
              claude plugin install "$p"
            done
            echo "::endgroup::"
          fi

      - name: Set review prompt
        id: set-prompt
        run: |
          if [ -n "${{ inputs.custom_prompt }}" ]; then
            echo "prompt<<EOF" >> $GITHUB_OUTPUT
            echo "${{ inputs.custom_prompt }}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "prompt<<EOF" >> $GITHUB_OUTPUT
            cat <<'PROMPT_EOF' >> $GITHUB_OUTPUT
          REPO: ${{ github.repository }}
          PR NUMBER: ${{ github.event.pull_request.number }}

          Please review this pull request and provide feedback on:
          - Code quality and best practices
          - Potential bugs or issues
          - Performance considerations
          - Security concerns
          - Test coverage

          Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

          Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.
          PROMPT_EOF
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1.0.111
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.set-prompt.outputs.prompt }}
          claude_args: ${{ inputs.allowed_tools }}
